<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>示例页面</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #17202a;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      section {
        width: min(680px, calc(100vw - 40px));
        border: 1px solid #d8dee6;
        border-radius: 8px;
        background: white;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>这是一个可编辑标题</h1>
        <p>点击这段中文，就可以在右侧修改错别字、标点和说明文字。</p>
        <button>按钮文字也可以修改</button>
      </section>
    </main>
    <script>
      console.log("脚本内容不应被文字编辑器修改");
    </script>
  </body>
</html>
